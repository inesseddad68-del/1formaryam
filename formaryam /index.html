<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#ffe4ec;
    --bg2:#ffd1e3;
    --heart-line:#d9738f;
    --heart-fill:#ffcfe1;
    --text:#ffc2dc;
    --pink-pink:#f15287;
    --pink-glow: rgba(241, 82, 135, 0.65);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'El Messiri', sans-serif;
    overflow:hidden;
    touch-action: manipulation;
  }
  body{
    background: #000;
  }
  #app{
    position:relative;
    width:100%; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  .page{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:20px;
    text-align:center;
    animation: fadeIn .5s ease;
  }
  .page.active{ display:flex; }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(12px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  /* PAGE 1 STYLES */
  .heading{
    font-family: 'Great Vibes', cursive;
    font-weight: 400;
    font-size: clamp(2.3rem, 9.5vw, 3.3rem);
    color: var(--text);
    margin-bottom: 2px;
  }
  .hint{
    font-family:'El Messiri', sans-serif;
    font-weight: 500;
    font-size: clamp(0.72rem, 3vw, 0.85rem);
    color: rgba(255,194,220,0.7);
    margin-top:-10px;
  }

  .heart-wrap{
    position:relative;
    width: min(210px, 60vw);
    aspect-ratio: 1 / 0.9;
    transition: filter .25s ease;
  }
  .heart-wrap svg{
    position:absolute;
    inset:0;
    width:100%; height:100%;
    overflow: visible;
    transition: fill .25s ease, stroke .25s ease;
  }
  .heart-wrap path{
    fill: var(--heart-fill);
    stroke: var(--heart-line);
    stroke-width: 0.9;
    paint-order: stroke fill;
    transition: fill .25s ease, stroke .25s ease;
  }
  .heart-wrap.success path{
    fill:#eafaf1;
    stroke:#3aa66a;
  }
  .heart-wrap.success{
    animation: successPulse .6s ease;
  }
  @keyframes successPulse{
    0%{ transform: scale(1); }
    40%{ transform: scale(1.15); }
    100%{ transform: scale(1); }
  }
  .heart-wrap.wrong path{
    fill:#fde3e3;
    stroke:#d9403f;
  }
  .heart-wrap.wrong .heart-svg{ animation: shakeHeart .45s; }
  @keyframes shakeHeart{
    10%,90%{ transform: translateX(-3px); }
    20%,80%{ transform: translateX(4px); }
    30%,50%,70%{ transform: translateX(-6px); }
    40%,60%{ transform: translateX(6px); }
  }

  .success-check{
    position:absolute;
    left:50%; top:47%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(2.2rem, 10vw, 3rem);
    color:#3aa66a;
    z-index:6;
    opacity:0;
  }
  .heart-wrap.success .success-check{
    animation: checkPop .5s ease forwards .1s;
  }
  @keyframes checkPop{
    0%{ transform: translate(-50%, -50%) scale(0); opacity:0; }
    60%{ transform: translate(-50%, -50%) scale(1.2); opacity:1; }
    100%{ transform: translate(-50%, -50%) scale(1); opacity:1; }
  }

  .wrong-mark{
    position:absolute;
    left:50%; top:47%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(2rem, 9vw, 2.7rem);
    color:#d9403f;
    z-index:6;
    opacity:0;
  }
  .heart-wrap.wrong .wrong-mark{
    animation: wrongPop .55s ease forwards;
  }
  @keyframes wrongPop{
    0%{ transform: translate(-50%, -50%) scale(0); opacity:0; }
    50%{ transform: translate(-50%, -50%) scale(1.25); opacity:1; }
    75%{ transform: translate(-50%, -50%) scale(1); opacity:1; }
    100%{ transform: translate(-50%, -50%) scale(1); opacity:0; }
  }

  .code-row{
    position:absolute;
    left:50%; top:47%;
    transform: translate(-50%, -50%);
    display:flex;
    align-items:center;
    gap: clamp(4px, 1.6vw, 8px);
    z-index: 5;
    direction: ltr;
  }
  .digit-stack{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
  }
  .digit-box{
    width: clamp(28px, 8vw, 36px);
    height: clamp(34px, 9.5vw, 42px);
    border-radius: 7px;
    background: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'El Messiri', sans-serif;
    font-weight:700;
    font-size: clamp(1rem, 4.4vw, 1.25rem);
    color:#000;
    box-shadow: 0 2px 5px rgba(0,0,0,0.18);
    overflow:hidden;
    cursor: pointer;
    touch-action: none;
  }
  .slash{
    color: var(--heart-line);
    font-weight:700;
    font-size: clamp(0.95rem, 3.8vw, 1.2rem);
    margin: 0 1px;
  }

  .check-btn{
    margin-top: 10px;
    width: clamp(46px, 13vw, 54px);
    height: clamp(46px, 13vw, 54px);
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #ff6fa0, #e8437c);
    color:#fff;
    font-size: clamp(1.1rem, 4.6vw, 1.35rem);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow: 0 4px 12px rgba(232,67,124,0.55);
  }
  .check-btn:active{ transform: scale(0.92); }
  .check-btn:disabled{ opacity:0.5; pointer-events:none; }

  /* GENERAL CARD & BADGE STYLES */
  .p-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 330px;
    gap: 16px;
  }

  .kitty-card {
    width: 270px;
    height: 270px;
    background: #000;
    border-radius: 28px;
    border: 2.5px solid var(--pink-pink);
    box-shadow: 0 0 16px rgba(241, 82, 135, 0.4);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .kitty-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .text-badge {
    background-color: #000000;
    border: 1.8px solid var(--pink-pink);
    border-radius: 16px;
    padding: 8px 20px;
    color: #ffffff;
    font-family: 'El Messiri', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    box-shadow: 0 0 12px rgba(241, 82, 135, 0.25);
    margin-top: 2px;
    min-height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: fit-content;
    max-width: 95%;
    line-height: 1.4;
  }

  .hello-btn {
    background: var(--pink-pink);
    color: #ffffff;
    border: none;
    border-radius: 30px;
    padding: 8px 36px;
    font-family: 'El Messiri', sans-serif;

  .hello-btn:active {

  .btn-group {

    flex-direction: row;
    align-items: center;
    justify-content: center;

    width: 100%;
    position: relative;

  .action-btn {

</style>

<script>
function goTo(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if(pageId === 'page3'){
    startPage3Text();
  } else if(pageId === 'page4'){
    startPage4Text();
  } else if(pageId === 'page5'){
    startPage5Text();
  } else if(pageId === 'page6'){
    startPage6Text();
  } else if(pageId === 'page7'){

  } else if(pageId === 'page8'){
    startPage8Text();
  } else if(pageId === 'page9'){
    startPage9Text();
  } else if(pageId === 'page10'){
    startPage10Text();
  } else if(pageId === 'page11'){
    startPage11Text();
  } else if(pageId === 'page12'){
    startPage12Text();
  }
}

function typeWriter(element, text, speed = 25, callback) {
  element.textContent = '';
  let i = 0;
  function type() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(type, speed);
    } else if (callback) {
      callback();
    }
  }
  type();
}

/* PAGE 1 LOGIC */
const CODE = [0,2,2,8]; 
const values = [0,0,0,0]; 
const boxes = ['d0','d1','d2','d3'].map(id => document.getElementById(id));
const heartWrap = document.getElementById('heartWrap');
const checkBtn = document.getElementById('checkBtn');
let locked = false;

function render(){
  boxes.forEach((b,i)=> b.textContent = values[i]);
}

function changeDigit(i, dir){
  if(locked) return;
  values[i] = (values[i] + dir + 10) % 10;
  render();
}

function checkCode(){
  if(locked) return;
  const correct = values.every((v,i) => v === CODE[i]);

  if(correct){
    locked = true;
    checkBtn.disabled = true;
    heartWrap.classList.remove('wrong');
    heartWrap.classList.add('success');
    setTimeout(() => { goTo('page2'); }, 900);
  } else {
    heartWrap.classList.remove('wrong');
    void heartWrap.offsetWidth;
    heartWrap.classList.add('wrong');
    setTimeout(() => { heartWrap.classList.remove('wrong'); }, 700);
  }
}

checkBtn.addEventListener('click', checkCode);

boxes.forEach((box, i) => {
  let startY = null;
  let isDragging = false;

  box.addEventListener('pointerdown', (e) => {
    startY = e.clientY;
    isDragging = false;
    box.setPointerCapture(e.pointerId);
  });

  box.addEventListener('pointermove', (e) => {
    if (startY === null) return;
    const dy = e.clientY - startY;
    if (Math.abs(dy) > 15) {
      isDragging = true;
      changeDigit(i, dy < 0 ? 1 : -1);
      startY = e.clientY;
    }
  });

  box.addEventListener('pointerup', (e) => {
    if (!isDragging && startY !== null) {
      changeDigit(i, 1);
    }
    startY = null;
    isDragging = false;
    try { box.releasePointerCapture(e.pointerId); } catch(err){}
  });

  box.addEventListener('pointercancel', () => {
    startY = null;
    isDragging = false;
  });

  box.addEventListener('wheel', (e) => {
    e.preventDefault();
    changeDigit(i, e.deltaY < 0 ? 1 : -1);
  }, {passive:false});
});

render();

/* RUNAWAY BUTTONS LOGIC */
function escapeButton(btn) {
  const x = (Math.random() - 0.5) * 220;
  const y = (Math.random() - 0.5) * 160;
  btn.style.transform = `translate(${x}px, ${y}px)`;
}

['runawayBtn1', 'runawayBtn2', 'runawayBtn3', 'runawayBtn4', 'runawayBtn5', 'runawayBtn6'].forEach(id => {
  const btn = document.getElementById(id);
  if(btn){
    ['mouseover', 'touchstart', 'click'].forEach(evt => {
      btn.addEventListener(evt, (e) => {
        e.preventDefault();
        escapeButton(btn);
      });
    });
  }
});
